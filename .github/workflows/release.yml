name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gburn-x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: gburn-x86_64-pc-windows-msvc.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gburn-aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
            asset: gburn-x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/gburn" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/gburn.exe" "${{ matrix.asset }}"

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}

  npm:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          scope: "@wiktorekdev"

      - name: Ensure npm supports OIDC
        run: |
          npm install -g npm@11.5.1
          npm --version

      - name: Publish
        run: npm publish --access public
        env:
          # setup-node injects a dummy token; clear so OIDC is used
          NODE_AUTH_TOKEN: ""
