name: release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset: gburn-x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: gburn-x86_64-pc-windows-msvc.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: gburn-aarch64-apple-darwin
          # cross-compile Intel Mac from arm runner (macos-13 runners are gone)
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: gburn-x86_64-apple-darwin

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          cp "target/${{ matrix.target }}/release/gburn" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target/${{ matrix.target }}/release/gburn.exe" "${{ matrix.asset }}"

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
